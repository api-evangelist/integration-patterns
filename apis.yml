aid: integration-patterns
name: Integration Patterns
segments:
  - Architecture
description: >-
  Integration Patterns are design patterns and best practices for integrating
  different software systems and applications, including messaging, data
  transformation, and service orchestration approaches. Enterprise Integration
  Patterns (EIP), as cataloged by Gregor Hohpe and Bobby Woolf, provide a
  technology-independent vocabulary and visual notation harvested from proven
  solutions to recurring integration problems, organized into Messaging
  Channels, Message Construction, Message Routing, Message Transformation,
  Messaging Endpoints, and System Management.
